x-app-environment: &app-environment
  DEBUG: "false"
  SECRET_KEY: local-compose-secret-change-outside-development
  ALLOWED_HOSTS: localhost,127.0.0.1
  SECURE_SSL_REDIRECT: "false"
  SECURE_HSTS_SECONDS: "0"
  DB_ENGINE: postgresql
  DB_NAME: mmorpg_board
  DB_USER: mmorpg
  DB_PASSWORD: mmorpg-local
  DB_HOST: db
  DB_PORT: "5432"
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  CELERY_TASK_ALWAYS_EAGER: "false"
  EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
  DEFAULT_FROM_EMAIL: noreply@example.com

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mmorpg_board
      POSTGRES_USER: mmorpg
      POSTGRES_PASSWORD: mmorpg-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmorpg -d mmorpg_board"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: >-
      sh -c "python manage.py migrate --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"
    environment: *app-environment
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media-data:/app/media
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: celery -A config worker --loglevel=info
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A config beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  media-data:
