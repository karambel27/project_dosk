{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

    <h1>Вход</h1>

    <form method="post">

        {% csrf_token %}

        {{ form.non_field_errors }}

        <div class="form-group">
            {{ form.login.label_tag }}
            {{ form.login }}
        </div>

        <div class="form-group">
            {{ form.password.label_tag }}
            {{ form.password }}
        </div>

        <button type="submit">
            Войти
        </button>

    </form>

    <p>
        <a href="{% url 'account_reset_password' %}">
            Забыли пароль?
        </a>
    </p>

</div>

{% endblock %}
